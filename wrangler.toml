name = "live-google-slide"
main = "src/index.js"
# 2026-04-07+ 讓 web_socket_auto_reply_to_close 預設開啟
compatibility_date = "2026-04-07"

# 綁自訂網域：hsiehting.com 這個 zone 已接進 Cloudflare，custom_domain 會
# 自動建立 DNS 紀錄與憑證。
routes = [
  { pattern = "live.hsiehting.com", custom_domain = true }
]

# CF Access：presenter 身分驗證（取代舊的 PRESENT_KEY secret）。
# 用 cf-gate 保護 /present 後，把 team 網域與 application AUD 填進這裡。
# 兩個都是公開設定、非機密；空著時 presenter 一律驗不過（fail-closed），
# 本機 dev 走 localhost 例外放行，不受影響。
[vars]
ACCESS_TEAM_DOMAIN = ""   # 例：yourteam.cloudflareaccess.com
ACCESS_AUD = ""           # Access application 的 Audience (AUD) tag

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
# 免費方案的 Durable Object 必須用 SQLite-backed storage
new_sqlite_classes = ["Room"]
