<!doctype html>
<html><head><meta charset="utf-8">
<style>
  :root{--bg:#0e1525;--card:#162033;--line:#26324a;--txt:#e7ecf3;--mut:#93a1b8;--accent:#5b8cff;--accent-d:#3f6fe0;--ok:#34d399}
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:40px auto;padding:0 18px;background:var(--bg);color:var(--txt)}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--mut);font-size:13px;margin:0 0 22px}
  label{display:block;margin:18px 0 6px;font-size:13px;color:var(--mut)}
  input{width:100%;padding:11px 12px;font-size:14px;color:var(--txt);background:var(--card);
        border:1px solid var(--line);border-radius:10px}
  input:focus{outline:0;border-color:var(--accent)}
  .save{margin-top:22px;display:flex;align-items:center;gap:12px}
  button{padding:10px 22px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  button:hover{background:var(--accent-d)}
  #ok{color:var(--ok);font-size:13px}
  .note{margin-top:26px;padding:13px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;
        color:var(--mut);font-size:12px;line-height:1.6}
  .note b{color:var(--txt)}
</style></head><body>
  <h1>Live Google Slide — 設定</h1>
  <p class="sub">只填一次，之後每份簡報共用。</p>

  <label>Cloudflare 網址（你的 Worker，含 https://）</label>
  <input id="cfUrl" placeholder="https://live.example.com">

  <div class="save"><button id="save">儲存</button><span id="ok"></span></div>

  <div class="note">
    presenter 身分由 <b>Cloudflare Access</b> 把關——不用再設「控制密碼」。
    第一次開直播時會跳出登入（Google／email），登入一次後會記住。
    PIN 則是每場在 popup 設定、報給聽眾的。
  </div>
  <script src="options.js"></script>
</body></html>
