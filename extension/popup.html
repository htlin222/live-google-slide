<!doctype html>
<html><head><meta charset="utf-8">
<style>
  :root{
    --bg:#0e1525; --card:#162033; --line:#26324a; --txt:#e7ecf3; --mut:#93a1b8;
    --accent:#5b8cff; --accent-d:#3f6fe0; --ok:#34d399; --live:#ff5d5d; --warn:#ffb454;
  }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,sans-serif;width:320px;margin:0;padding:16px;background:var(--bg);color:var(--txt)}
  .head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .head h1{font-size:15px;margin:0;font-weight:600}
  .head .gear{margin-left:auto;color:var(--mut);cursor:pointer;font-size:15px;line-height:1;padding:4px;border-radius:6px}
  .head .gear:hover{background:var(--line);color:var(--txt)}

  .auth{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
        border-radius:10px;padding:9px 11px;font-size:12px;margin-bottom:12px}
  .auth .ico{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:none}
  .auth.in .ico{background:var(--ok)} .auth .who{color:var(--mut)}
  .auth button{margin-left:auto;padding:5px 12px;border:0;border-radius:7px;background:var(--accent);
        color:#fff;font-size:12px;cursor:pointer} .auth button:hover{background:var(--accent-d)}
  .auth.in button{display:none}

  label{display:block;margin:12px 0 5px;font-size:11px;color:var(--mut);letter-spacing:.02em}
  input,textarea{width:100%;padding:9px 10px;font-size:13px;color:var(--txt);background:var(--card);
        border:1px solid var(--line);border-radius:9px;font-family:inherit}
  input:focus,textarea:focus{outline:0;border-color:var(--accent)}
  textarea{height:52px;resize:vertical}
  .row{display:flex;gap:8px;align-items:center}.row input{flex:1}
  #gen{flex:none;padding:9px 12px;border:0;border-radius:9px;background:var(--line);color:var(--txt);cursor:pointer;font-size:12px}
  #gen:hover{background:#33425f}

  .actions{margin-top:16px}
  .actions button{width:100%;padding:11px;border:0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#fff}
  #start{background:var(--accent)} #start:hover{background:var(--accent-d)}
  #stop{background:var(--live)}

  #warn{display:none;color:var(--warn);font-size:12px;margin-bottom:10px}
  #status{margin-top:14px;font-size:12px;line-height:1.55;color:var(--mut);
          background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 11px}
  #status .live{color:var(--ok);font-weight:600} #status .off{color:var(--live)}
  .pin{font-size:22px;letter-spacing:5px;font-weight:700;color:var(--txt)}
  .view{word-break:break-all;color:var(--accent)}
  :disabled{opacity:.45;cursor:not-allowed}
</style></head><body>
  <div class="head">
    <h1>Live Google Slide</h1>
    <span id="gear" class="gear" title="設定">⚙</span>
  </div>

  <div id="warn"></div>

  <div id="auth" class="auth">
    <span class="ico"></span><span id="who" class="who">未登入 CF Access</span>
    <button id="signin">登入</button>
  </div>

  <label>embed 網址（開著 Slides 分頁會自動帶入）</label>
  <textarea id="embed" placeholder="開一個 Google Slides 分頁就會自動填好"></textarea>
  <div style="font-size:11px;color:var(--mut);margin-top:4px">deck 需設為「知道連結的人皆可檢視」，觀眾的 iframe 才載得到。</div>

  <div class="row" style="margin-top:4px">
    <div style="flex:1"><label>房間 room</label><input id="room" placeholder="default"></div>
    <div style="flex:1"><label>PIN（報給聽眾）</label><div class="row"><input id="pin" maxlength="8"><button id="gen">產生</button></div></div>
  </div>

  <div class="actions">
    <button id="start">開始直播</button>
    <button id="stop" style="display:none">結束直播</button>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body></html>
