name: 功能建議
description: 提出一個點子或改進
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題
      description: 你遇到什麼狀況讓你想要這個功能？
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: 期望的做法
  - type: textarea
    id: alt
    attributes:
      label: 考慮過的替代方案
