name: Release Extension

# push 到 main（含 PR merge）且動到 extension/ 時自動發版；也可手動執行
on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/release-extension.yml"
  workflow_dispatch:

permissions:
  contents: write   # 建立 tag 與 Release 需要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 版本 = manifest 的 major.minor + 本次 run 編號當 patch（自動遞增，不 commit 回 main）
      - name: Compute version
        id: v
        run: |
          BASE=$(node -p "require('./extension/manifest.json').version.split('.').slice(0,2).join('.')")
          echo "version=${BASE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Stamp manifest version
        run: |
          node -e '
            const fs=require("fs");
            const m=JSON.parse(fs.readFileSync("extension/manifest.json"));
            m.version="${{ steps.v.outputs.version }}";
            fs.writeFileSync("extension/manifest.json", JSON.stringify(m,null,2)+"\n");
          '

      # 從 CHANGELOG 取 [Unreleased] 段落當 Release 說明（空的話給預設一行）
      - name: Build release body from CHANGELOG
        run: |
          awk '/^## \[Unreleased\]/{f=1;next} /^## /{f=0} f' CHANGELOG.md > RELEASE_BODY.md || true
          if ! grep -q '[^[:space:]]' RELEASE_BODY.md; then
            echo "Automated extension release v${{ steps.v.outputs.version }}." > RELEASE_BODY.md
          fi

      - name: Package extension
        run: |
          cd extension
          zip -rq "../live-google-slide-extension-v${{ steps.v.outputs.version }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: Extension v${{ steps.v.outputs.version }}
          body_path: RELEASE_BODY.md
          generate_release_notes: true   # 自動附上本次合併的 PR / commit 清單，接在上面內容之後
          files: live-google-slide-extension-v${{ steps.v.outputs.version }}.zip
